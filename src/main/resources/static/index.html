<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>外贸销售商机工作台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>外贸销售商机工作台</h1>
    <div class="health"><span id="dot" class="dot"></span><span id="health">检测服务中...</span></div>
  </header>

  <main>
    <section>
      <h2>客户询盘</h2>
      <div class="grid2">
        <div>
          <label for="customerName">联系人</label>
          <input id="customerName" value="Ahmed Khan">
        </div>
        <div>
          <label for="companyName">公司</label>
          <input id="companyName" value="Gulf Home Supplies LLC">
        </div>
      </div>
      <div class="grid2">
        <div>
          <label for="country">国家/地区</label>
          <input id="country" value="United Arab Emirates">
        </div>
        <div>
          <label for="productName">产品</label>
          <input id="productName" value="Stainless steel water bottle">
        </div>
      </div>
      <div class="grid2">
        <div>
          <label for="quantity">数量</label>
          <input id="quantity" value="8,000 pcs">
        </div>
        <div>
          <label for="targetPrice">目标价</label>
          <input id="targetPrice" value="USD 2.35/pc">
        </div>
      </div>
      <div class="grid2">
        <div>
          <label for="incoterm">贸易条款</label>
          <input id="incoterm" value="FOB Ningbo">
        </div>
        <div>
          <label for="destinationPort">目的港</label>
          <input id="destinationPort" value="Jebel Ali">
        </div>
      </div>
      <label for="message">原始邮件</label>
      <textarea id="message">Dear supplier, we are looking for 8000 pcs stainless steel water bottles, 750ml, matte black, with our logo printing. Please quote FOB Ningbo. Our target price is USD 2.35/pc. We need delivery before July promotion season. Please also advise sample cost and lead time.</textarea>
      <div class="grid2">
        <div>
          <label for="preferredModel">AI 模型</label>
          <select id="preferredModel">
            <option value="">自动判断</option>
            <option value="DEEPSEEK">DeepSeek（推理强）</option>
            <option value="ALIBABA_BAILIAN">阿里百炼（规划强）</option>
          </select>
        </div>
        <div>
          <label for="token">访问令牌</label>
          <input id="token" value="dev-token">
        </div>
      </div>
      <div class="actions">
        <button id="analyze">评估商机</button>
        <button id="plan" class="secondary">生成计划</button>
        <button id="reply" class="neutral">写回复</button>
      </div>
    </section>

    <section>
      <div class="board">
        <div class="metric">
          <div class="name">商机评分</div>
          <div id="score" class="value">-</div>
          <div id="intent" class="small">等待评估</div>
        </div>
        <div class="metric">
          <div class="name">风险等级</div>
          <div id="risk" class="value">-</div>
          <div id="model" class="small">模型未调用</div>
        </div>
        <div class="metric">
          <div class="name">下一步</div>
          <div id="next" class="small">请先录入或使用默认询盘</div>
        </div>
      </div>

      <div class="tabs">
        <button id="tabSummary" class="tab active">商机摘要</button>
        <button id="tabTasks" class="tab">推进任务</button>
        <button id="tabReply" class="tab">客户回复</button>
      </div>
      <div id="summary" class="summary-box">等待分析...</div>
      <div id="tasks" class="tasks hidden"></div>
      <pre id="replyBox" class="hidden">等待生成...</pre>
    </section>

    <!-- ========== 右侧：产品知识库问答 ========== -->
    <section class="rag-section">
      <div class="rag-panel" id="ragPanel">
        <div class="rag-header" id="ragHeader">
          <div class="rag-header-left">
            <div class="rag-icon">📦</div>
            <div class="rag-title-area">
              <h3>产品知识库问答</h3>
            </div>
          </div>
        </div>
        <div class="rag-body open" id="ragBody">
          <div class="rag-messages" id="ragMessages">
            <div class="rag-empty">
              <div class="rag-empty-icon">💡</div>
              <div>试试提问：产品有哪些认证？支持定制吗？</div>
            </div>
          </div>
          <div class="rag-quick" id="ragQuick">
            <button class="rag-quick-btn" data-question="不锈钢水瓶的核心材质是什么？">不锈钢水瓶的核心材质</button>
            <button class="rag-quick-btn" data-question="不锈钢水瓶支持定制吗？">不锈钢水瓶支持定制吗</button>
            <button class="rag-quick-btn" data-question="外贸业务的基础核心工作是什么？">外贸业务的基础核心工作</button>
<!--            <button class="rag-quick-btn" data-question="产品质保政策是什么？">质保政策</button>-->
          </div>
          <div class="rag-input-area">
            <input id="ragInput" placeholder="输入产品相关问题，如：LED Panel 的色温范围？">
            <button class="purple" id="ragSend">提问</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/trade.js"></script>
  <script src="js/rag.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
