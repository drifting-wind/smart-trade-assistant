services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: smart-trade-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: smart-trade-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio-data:/minio_data
    command: minio server /minio_data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.4.12
    container_name: smart-trade-milvus
    # 【关键修复】显式指定配置文件路径，覆盖容器内默认配置
    command: ["milvus", "run", "standalone", "-c", "/milvus/configs/milvus.yaml"]
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus-data:/var/lib/milvus
      # 确保自定义配置文件正确挂载
      - ./configs/milvus.yaml:/milvus/configs/milvus.yaml
    depends_on:
      etcd:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: smart-trade-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-trade-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8080
      # Milvus 连接配置（若修改了宿主机映射端口，此处需同步更新）
      - AI_GATEWAY_RAG_MILVUS_HOST=milvus
      - AI_GATEWAY_RAG_MILVUS_PORT=19530
      - AI_GATEWAY_RAG_MILVUS_DATABASE=default
      # Redis 连接配置
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      # AI API 密钥（从环境变量读取，若未设置请在 .env 文件中配置）
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-your-dashscope-api-key}
      # JVM 优化参数
      - JAVA_OPTS=-Xms512m -Xmx1024m -XX:+UseG1GC
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

volumes:
  etcd-data:
  minio-data:
  milvus-data:
  redis-data:
  app-data:
  app-logs:

networks:
  app-network:
    driver: bridge