services:
  smart-trade-assistant:
    build: .
    image: smart-trade-assistant:1.0.0
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      BAILIAN_API_KEY: ${BAILIAN_API_KEY}
      AI_GATEWAY_TOKENS: ${AI_GATEWAY_TOKENS:-dev-token}
